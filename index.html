<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CST Ibérica — Posts RRSS</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B8%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__avatar">🔧</div>
      <div>
        <h1 class="header__title">CST Ibérica · Parrilla RRSS</h1>
        <p class="header__subtitle">Clic en un post para verlo completo</p>
      </div>
    </header>

    <div id="grid" class="grid"></div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div class="modal">
      <button id="modalCloseBtn" class="modal__close">✕</button>
      <div class="modal__media">
        <button id="modalPrevBtn" class="modal__nav modal__nav--prev">‹</button>
        <img id="modalImg" alt="" />
        <button id="modalNextBtn" class="modal__nav modal__nav--next">›</button>
        <div id="modalDots" class="modal__dots"></div>
      </div>
      <div class="modal__side">
        <h2 id="modalTitle" class="modal__title"></h2>
        <p id="modalCaption" class="modal__caption"></p>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
